<!DOCTYPE html>
<html>

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Q4 Drill 2</title>
	<style>
		body {
			font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif;
			background-image: url("bg.jpg");
			background-repeat: no-repeat;
			background-size: cover;
			background-attachment: fixed;
			background-position: center;
			margin: 0;
			height: 100vh;
			display: flex;
			justify-content: space-around;
			align-items: center;
			padding: 0 50px;
		}

		h1 {
			color: white;
			text-shadow: 2px 2px 10px rgba(0, 0, 0, 0.9);
			max-width: 450px;
			font-size: 3.5rem;
			margin: 0;
		}

		h2 {
			color: #0a1242;
			font-size: 1.2rem;
			margin: 2;
		}

		.container {
			background-color: rgba(255, 255, 255, 0.9);
			padding: 40px;
			border-radius: 15px;
			box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
			text-align: center;
			width: 380px;
			display: flex;
			flex-direction: column;
			align-items: center;
		}

		.header-row {
			display: flex;
			flex-direction: row;
			align-items: center;
			justify-content: center;
			width: 100%;
			margin-bottom: 20px;
			gap: 15px;
		}

		.logo {
			width: 100px;
			height: 100px;
			border-radius: 50%;
			border: 3px solid #0a1242;
			margin-bottom: 0;
		}

		.header-row p {
			text-align: left;
			margin: 0;
			font-size: 1.2rem;
			color: #555;
			max-width: 200px;
		}

		.container h1 {
			font-size: 1.2rem;
			margin: 10px 0;
			color: #333;
		}

		input {
			width: 100%;
			padding: 12px;
			margin-bottom: 15px;
			border: 1px solid #ccc;
			border-radius: 5px;
			font-size: 1rem;
			box-sizing: border-box;
		}

		button {
			background-color: #0a1242;
			color: white;
			border: none;
			padding: 12px 25px;
			border-radius: 5px;
			cursor: pointer;
			font-weight: bold;
			font-size: 1rem;
			font-family: 'Gill Sans';
			width: 100%;
		}

		#result {
			margin-top: 25px;
			padding-top: 15px;
			border-top: 1px solid #ddd;
			font-size: 1.1rem;
			color: #333;
			width: 100%;
		}
	</style>

</head>

<body>

	<h1>9-Emerald Heat Index Checker</h1>

	<div class="container">
		<div class="header-row">
			<img src="logo.jpg" alt="Logo" class="logo">
			<p>Input the temperature (°C) and humidity (%), then click "CHECK".</p>
		</div>

		<h2>Input temperature value in °C</h2>
		<input type="number" id="tempInput" placeholder="Input degree value">

		<h2>Input humidity value in %</h2>
		<input type="number" id="hmdtyInput" placeholder="Input percentage value">

		<br><br>
		<button onclick="checkIndex()">CHECK</button>

		<h3 id="result"></h3>
	</div>

	<script>
		function checkIndex() {

			var temp = parseFloat(document.getElementById("tempInput").value);
			var hmdty = parseFloat(document.getElementById("hmdtyInput").value);


			var heatIndex = temp + (0.33 * hmdty) - 4;
			var status;

			switch (true) {

				case (heatIndex <= 27): status = "Comfortable / Cool"
					break;

				case (heatIndex >= 28 && heatIndex <= 32): status = "Warm"
					break;

				case (heatIndex >= 33 && heatIndex <= 37): status = "Hot"
					break;

				case (heatIndex >= 38 && heatIndex <= 41): status = "Very Hot / Caution"
					break;

				case (heatIndex >= 41): status = "Extreme Heat /Danger";
					break;

				default:
					status = "Invalid Input! Kindly enter valid temperature and humidity values."
			}

			var finalResult = "Heat Index: " + heatIndex.toFixed(2) + "°C | Status: " + status;

			document.getElementById("result").innerHTML = finalResult;
		}
	</script>

</body>

</html>
